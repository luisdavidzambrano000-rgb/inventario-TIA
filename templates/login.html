<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card shadow p-4 mt-5">

                    <h2 class="text-center mb-4">
                        Iniciar Sesión
                    </h2>

                    <form method="POST">

                        <div class="mb-3">
                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                placeholder="Usuario"
                            >
                        </div>

                        <div class="mb-3">
                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                placeholder="Contraseña"
                            >
                        </div>

                        <button class="btn btn-primary w-100">
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
