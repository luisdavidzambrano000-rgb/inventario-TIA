<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="mb-4">
                Editar Producto
            </h1>

            <form method="POST">

                <div class="mb-3">
                    <input
                        type="text"
                        class="form-control"
                        name="codigo"
                        value="{{ producto[1] }}"
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="text"
                        class="form-control"
                        name="producto"
                        value="{{ producto[2] }}"
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="text"
                        class="form-control"
                        name="marca"
                        value="{{ producto[3] }}"
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="number"
                        class="form-control"
                        name="cantidad"
                        value="{{ producto[4] }}"
                    >
                </div>

                <div class="mb-3">
                    <input
                        type="date"
                        class="form-control"
                        name="caducidad"
                        value="{{ producto[5] }}"
                    >
                </div>

                <button class="btn btn-success w-100">
                    Guardar Cambios
                </button>

            </form>

        </div>

    </div>

</body>
</html>
